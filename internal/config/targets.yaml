# Cleanup Targets
#
# safety:
#   safe     - auto-regenerated (caches, logs)
#   moderate - may need re-download or re-login
#   risky    - may contain important data, default unselected
#
# method:
#   trash     - move to Trash (recoverable)
#   permanent - delete immediately (rm -rf)
#   command   - run shell command (requires 'command' field)
#   builtin   - use built-in scanner (docker, homebrew only)
#   manual    - user must delete manually (shows 'guide' in UI)

categories:
  # ===== System =====
  - id: trash
    name: Trash
    group: system
    safety: safe
    method: permanent
    note: Files already deleted by user, waiting in Trash
    paths:
      - "~/.Trash/*"
      - "/Volumes/*/.Trashes/*"

  - id: system-cache
    name: App Caches
    group: system
    safety: moderate
    method: trash
    note: Application caches - automatically regenerated when needed
    paths:
      - "~/Library/Caches/*"

  - id: system-logs
    name: System Logs
    group: system
    safety: moderate
    method: trash
    note: Old log files for debugging - usually not needed
    paths:
      - "/private/var/log/asl/*.asl"
      - "/Library/Logs/DiagnosticReports/*"
      - "~/Library/Logs/*"

  - id: quicklook
    name: QuickLook Cache
    group: system
    safety: safe
    method: trash
    note: Thumbnail previews for Finder - regenerated automatically
    paths:
      - "~/Library/Caches/com.apple.QuickLook.thumbnailcache/*"

  - id: saved-state
    name: Saved App State
    group: system
    safety: moderate
    method: trash
    note: App window positions and open documents - apps will start fresh
    paths:
      - "~/Library/Saved Application State/*"

  - id: incomplete-downloads
    name: Incomplete Downloads
    group: system
    safety: moderate
    method: trash
    note: Browser incomplete download files - can be re-downloaded
    paths:
      - "~/Downloads/*.download"
      - "~/Downloads/*.crdownload"
      - "~/Downloads/*.part"

  - id: user-diagnostic
    name: User Diagnostic Reports
    group: system
    safety: safe
    method: trash
    note: User-level crash reports and diagnostics - regenerated as needed
    paths:
      - "~/Library/DiagnosticReports/*"

  - id: shell-residue
    name: Shell History Residue
    group: system
    safety: safe
    method: permanent
    note: Backup history files and stale shell metadata - regenerated on next shell start
    paths:
      - "~/.bash_history.bak*"
      - "~/.zsh_history.bak*"
      - "~/.config/fish/fish_history.bak*"
      - "~/.zcompdump*"
      - "~/.lesshst"
      - "~/.viminfo.tmp"
      - "~/.wget-hsts"

  - id: identity-caches
    name: Identity Caches
    group: system
    safety: safe
    method: trash
    note: Apple identity service caches - regenerated automatically
    paths:
      - "~/Library/IdentityCaches/*"

  - id: macos-installer
    name: macOS Installer Files
    group: storage
    safety: moderate
    method: trash
    note: Old macOS installer leftovers - re-download from App Store if needed
    paths:
      - "/Applications/Install macOS*.app"
      - "/macOS Install Data"

  # ===== Browsers =====
  - id: browser-chrome
    name: Chrome Cache
    group: browser
    safety: safe
    method: trash
    note: Web page cache and GPU cache - regenerated on browsing
    paths:
